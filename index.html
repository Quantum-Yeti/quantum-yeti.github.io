<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quantum Yeti</title>

<style>

body{
margin:0;
font-family:system-ui;
background:linear-gradient(#000000,#0B1E3D);
color:white;
overflow-x:hidden;
}

/* floating background stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:.6;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* header */

header{
text-align:center;
padding:120px 20px;
}

h1{
font-size:56px;
margin:0;
}

.tagline{
opacity:.8;
font-size:20px;
margin-top:10px;
}

/* floating icons */

.icon{
position:absolute;
font-size:28px;
animation:float 10s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0px)}
}

/* sections */

section{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:12px;
transition:.2s;
}

.card:hover{
transform:translateY(-6px);
background:#181818;
}

a{
color:#6ab0ff;
text-decoration:none;
}

footer{
text-align:center;
padding:50px;
opacity:.6;
}

</style>

</head>

<body>

<!-- floating icons -->

<div class="icon" style="top:20%;left:10%">🛸</div>
<div class="icon" style="top:60%;left:85%">💻</div>
<div class="icon" style="top:40%;left:75%">🎵</div>
<div class="icon" style="top:70%;left:20%">⚙️</div>
<div class="icon" style="top:30%;left:50%">🧮</div>

<header>

<h1>Quantum Yeti</h1>

<p class="tagline">
Software Developer • Python • Java • Rust
</p>

</header>

<section>

<h2>About</h2>

<p>
Developer interested in computer science, mathematics, music, and creative software projects.
I build desktop applications, Android apps, and experimental tools.
</p>

</section>

<section>

<h2>Projects</h2>

<div class="projects" id="repos">

Loading repositories...

</div>

</section>

<footer>

<p>
© 2026 Quantum Yeti
</p>

</footer>

<script>

/* load GitHub repos */

fetch("https://api.github.com/users/quantum-yeti/repos")

.then(res => res.json())

.then(data => {

let container = document.getElementById("repos")

container.innerHTML=""

data.forEach(repo => {

let card = document.createElement("div")
card.className="card"

card.innerHTML=`
<h3>${repo.name}</h3>
<p>${repo.description ?? "Open source project."}</p>
<a href="${repo.html_url}">View Repository →</a>
`

container.appendChild(card)

})

})

</script>

</body>
</html>
